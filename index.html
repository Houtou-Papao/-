<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>幸运刮刮乐</title>
    <style>
        * {
            盒模型: border-box;
            外边距: 0;
            内边距: 0;
            -webkit-tap-highlight-color: transparent;
        }

        正文 {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            背景颜色: #f0f2f5;
            显示方式: 弹性盒子;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            最小高度: 100视口高度;
            溢出: 隐藏; /* 防止页面滚动 */
        }

        .容器 {
            定位: 相对;
            宽度: 300像素;
            高度: 150px;
            边框半径: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            溢出: 隐藏;
            背景: #fff;
        }

        /* 底层：奖品内容 */
        .奖品层 {
            position: absolute;
            top: 0;
            left: 0;
            宽度: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            color: #d63031;
            font-weight: bold;
            text-align: center;
            padding: 10px;
        }

        .prize-text {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .prize-sub {
            font-size: 14px;
            color: #555;
        }

        /* 顶层：刮刮层 */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            cursor: pointer;
            touch-action: none; /* 关键：阻止触摸时的默认滚动行为 */
        }

        .controls {
            margin-top: 30px;
            text-align: center;
        }

        button {
            background-color: #07c160; /* 微信绿 */
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.95);
        }

        .tip {
            margin-top: 15px;
            color: #888;
            font-size: 12px;
        }
        
        /* 简单的弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }
        .modal h3 { margin-bottom: 10px; color: #d63031; }
        .modal p { margin-bottom: 20px; color: #333; }
    </style>
</head>
<body>

    <!-- 刮刮卡容器 -->
    <div class="container" id="cardContainer">
        <!-- 奖品层 -->
        <div class="prize-layer" id="prizeLayer">
            <div class="prize-text" id="prizeText">加载中...</div>
            <div class="prize-sub">恭喜获得以上奖励</div>
        </div>
        <!-- 画布层 -->
        <canvas id="scratchCanvas"></canvas>
    </div>

    <div class="controls">
        <button onclick="resetCard()">再刮一次</button>
        <p class="tip">手指涂抹灰色区域即可刮开</p>
    </div>

    <!-- 结果弹窗 -->
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <h3 id="modalTitle">恭喜！</h3>
            <p id="modalMsg">你获得了大奖</p>
            <button onclick="closeModal()">确定</button>
        </div>
    </div>

<script>
    /**
     * ==========================================
     *  🛠️ 自定义配置区域 (在这里修改你的内容)
     * ==========================================
     */
    const CONFIG = {
        // 奖品列表，可以添加多个，程序会随机抽取一个
        prizes: [
            { text: "谢谢参与", sub: "下次好运" },
             { text: "神秘数字", sub: "123456789" }
        ],
        coverColor: '#CCCCCC', // 刮刮层颜色
        coverText: '刮一刮',   // 刮刮层文字
        brushSize: 20,         // 笔刷大小
        clearThreshold: 0.5    // 刮开多少比例算完成 (0.5 = 50%)
    };

    /**
     * ==========================================
     *  💻 核心逻辑代码 (通常不需要修改)
     * ==========================================
     */
    
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('cardContainer');
    const prizeTextEl = document.getElementById('prizeText');
    const prizeSubEl = document.querySelector('.prize-sub');
    
    let isDrawing = false;
    let lastPoint = null;
    let isRevealed = false;

    // 初始化
    function init() {
        // 设置画布尺寸与容器一致
        const width = container.offsetWidth;
        const height = container.offsetHeight;
        canvas.width = width;
        canvas.height = height;

        // 随机选择一个奖品
        const randomPrize = CONFIG.prizes[Math.floor(Math.random() * CONFIG.prizes.length)];
        prizeTextEl.innerText = randomPrize.text;
        prizeSubEl.innerText = randomPrize.sub;
        
        // 存储当前奖品用于弹窗
        canvas.dataset.prize = randomPrize.text;

        drawCover();
        bindEvents();
    }

    // 绘制覆盖层
    function drawCover() {
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = CONFIG.coverColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 绘制提示文字
        ctx.font = 'bold 24px Arial';
        ctx.fillStyle = '#999';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(CONFIG.coverText, canvas.width / 2, canvas.height / 2);
        
        isRevealed = false;
    }

    // 绑定事件 (支持鼠标和触摸)
    function bindEvents() {
        // 鼠标事件
        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', drawing);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('mouseleave', endDraw);

        // 触摸事件 (微信端主要用这个)
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 防止滚动
            startDraw(e.touches[0]);
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault(); // 防止滚动
            drawing(e.touches[0]);
        }, { passive: false });
        
        canvas.addEventListener('touchend', endDraw);
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        return {
            x: e.clientX - rect.left,
            y: e.clientY - rect.top
        };
    }

    function startDraw(e) {
        if (isRevealed) return;
        isDrawing = true;
        lastPoint = getPos(e);
    }

    function drawing(e) {
        if (!isDrawing || isRevealed) return;
        
        const currentPoint = getPos(e);
        const dist = distance(lastPoint, currentPoint);
        
        // 使用 destination-out 模式擦除
        ctx.globalCompositeOperation = 'destination-out';
        ctx.lineWidth = CONFIG.brushSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        
        ctx.beginPath();
        ctx.moveTo(lastPoint.x, lastPoint.y);
        ctx.lineTo(currentPoint.x, currentPoint.y);
        ctx.stroke();
        
        lastPoint = currentPoint;
        
        // 节流检查进度，避免每帧都计算像素，影响性能
        if (Math.random() > 0.8) { 
            checkPercentage();
        }
    }

    function endDraw() {
        isDrawing = false;
        lastPoint = null;
        checkPercentage(); // 结束时强制检查一次
    }

    function distance(p1, p2) {
        返回 Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
    }

    // 检查刮开比例
    function checkPercentage() {
        如果 (已揭示) 返回;

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = imageData.data;
        let transparentPixels = 0;
        
        // 遍历像素，alpha通道为0表示透明
        for (let i = 3; i < pixels.length; i += 4) {
            if (pixels[i] === 0) {
                透明像素++;
            }
        }
        
        const percentage = transparentPixels / (pixels.length / 4);
        
        如果 (百分比 > CONFIG.清除阈值) {
            揭示所有();
        }
    }

    // 完全揭示
    函数 revealAll() {
        isRevealed = true;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        showModal(canvas.dataset.prize);
    }

    // 重置
    window.resetCard = function() {
        drawCover();
    }

    // 弹窗逻辑
    函数 showModal(奖品) {
        常量 modal = 文档.getElementById('resultModal');
        const title = document.getElementById('modalTitle');
        const msg = document.getElementById('modalMsg');
        
        if (prize.includes("谢谢") || prize.includes("未中")) {
            title.innerText = "很遗憾";
            title.style.color = "#666";
        } else {
            title.innerText = "🎉 恭喜中奖！";
            标题.样式.颜色 = "#d63031";
        }
        消息.innerText = `你获得了：${奖品}`;
        modal.style.display = 'flex';
    }

    window.closeModal = function() {
        文档.getElementById('resultModal').样式.显示 = '无';
    }

    // 启动
    init();

</script>
</正文>
</html>
